name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd project
          pip install -r requirements.txt
          pip install pytest

      - name: Create .env file
        run: |
          cd project
          echo "DATABASE_URL=sqlite:///./test.db" > .env
          echo "SECRET_KEY=test_secret_key_for_ci_12345" >> .env
          echo "OPENROUTER_API_KEY=dummy_key_for_ci" >> .env
          echo "ALGORITHM=HS256" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=60" >> .env

      - name: Run tests
        run: |
          cd project
          pytest
